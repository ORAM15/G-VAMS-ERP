name: Autonomous Evolution Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "42 3 * * *"

permissions:
  contents: read

jobs:
  autonomous-cycle:
    name: Prepare and gate autonomous cycle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate autonomous scripts
        run: |
          node --check scripts/autonomous-agent-context.js
          node --check scripts/agent-gatekeeper.js
          node --check scripts/agent-runtime-adapter.js
          node --check scripts/agent-cycle.js

      - name: Validate agent JSON state and schemas
        run: |
          node -e "for (const f of ['.agent/DAILY_DECISIONS.json','.agent/schemas/decision.schema.json','.agent/schemas/runtime-result.schema.json','.agent/runtime/config.json']) { JSON.parse(require('fs').readFileSync(f, 'utf8')); console.log(f + ' is valid JSON'); }"

      - name: Generate autonomous agent context
        run: node scripts/autonomous-agent-context.js

      - name: Run deterministic input gate
        run: node scripts/agent-gatekeeper.js input

      - name: Execute one gated agent cycle
        run: node scripts/agent-cycle.js

      - name: Report disabled runtime status
        if: always()
        run: |
          if test -f .agent/runtime/runtime-result.json; then
            node -e "const r = JSON.parse(require('fs').readFileSync('.agent/runtime/runtime-result.json','utf8')); console.log('runtime=' + r.runtime); console.log('outcome=' + r.outcome); console.log(r.implementation_summary);"
          else
            echo "No runtime result was produced."
          fi
          echo "Phase 2A does not pretend implementation occurred when runtime mode is disabled."
