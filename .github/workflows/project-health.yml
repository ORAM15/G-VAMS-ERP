name: Project Health

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: write

jobs:
  project-health:
    name: Generate project health report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Generate project health report
        run: node scripts/generate-project-health.js

      - name: Commit project health changes
        run: |
          if git diff --quiet -- docs/PROJECT_HEALTH.md; then
            echo "Project health report is unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/PROJECT_HEALTH.md
          git commit -m "Update project health report"
          git push
