name: Autonomous Evolution Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "42 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  autonomous-cycle:
    name: Phase 2B supervised autonomous cycle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Context
        run: |
          node --check scripts/autonomous-agent-context.js
          node --check scripts/agent-gatekeeper.js
          node --check scripts/agent-runtime-adapter.js
          node --check scripts/agent-cycle.js
          node --check scripts/agent-branch-publish.js
          node -e "for (const f of ['.agent/DAILY_DECISIONS.json','.agent/schemas/decision.schema.json','.agent/schemas/runtime-result.schema.json','.agent/runtime/config.json']) { JSON.parse(require('fs').readFileSync(f, 'utf8')); console.log(f + ' is valid JSON'); }"
          node scripts/autonomous-agent-context.js
          node scripts/agent-gatekeeper.js record-base

      - name: Runtime activation guard
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "AGENT_RUNTIME_MODE=disabled" >> "$GITHUB_ENV"
            echo "Scheduled coding remains disabled during Phase 2B."
          else
            echo "AGENT_RUNTIME_MODE=${{ vars.AGENT_RUNTIME_MODE }}" >> "$GITHUB_ENV"
          fi
          echo "AGENT_LLM_MODEL=gemini/gemini-3.1-flash-lite" >> "$GITHUB_ENV"
          echo "AGENT_IMPLEMENTATION_MODELS=gemini/gemini-3.5-flash,gemini/gemini-3.1-flash-lite" >> "$GITHUB_ENV"

      - name: Input Gate
        run: node scripts/agent-gatekeeper.js input

      - name: Direct Gemini Decision Runtime
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/agent-runtime-adapter.js decision

      - name: Decision Gate
        if: env.AGENT_RUNTIME_MODE == 'openhands'
        run: node scripts/agent-gatekeeper.js decision .agent/runtime/current-decision.json

      - name: Install pinned OpenHands implementation runtime after decision approval
        if: env.AGENT_RUNTIME_MODE == 'openhands'
        run: |
          python -m pip install --upgrade pip
          python -m pip install "git+https://github.com/OpenHands/OpenHands-CLI.git@2df8a2835d3f1bd2f2eadf5a7a2e1ad0dfb0d271"
          openhands --version

      - name: Implementation Runtime
        if: env.AGENT_RUNTIME_MODE == 'openhands'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/agent-runtime-adapter.js implementation

      - name: Implementation Evidence Gate
        if: env.AGENT_RUNTIME_MODE == 'openhands'
        run: |
          test -s .agent/runtime/implementation-openhands.jsonl || { echo "OpenHands produced no execution trace."; exit 1; }
          test -s .agent/runtime/runtime-result.json || { echo "OpenHands produced no runtime result."; exit 1; }
          node scripts/agent-gatekeeper.js result-diff .agent/runtime/runtime-result.json
          node - <<'NODE'
          const fs = require('fs');
          const r = JSON.parse(fs.readFileSync('.agent/runtime/runtime-result.json', 'utf8'));
          if (r.outcome === 'blocked') {
            if (Array.isArray(r.changed_files) && r.changed_files.length > 0) throw new Error('Blocked implementation cannot report changed files');
            console.log('Implementation is blocked by provider capacity; preserving evidence for Result Gate.');
            process.exit(0);
          }
          if (r.outcome !== 'success') throw new Error('Implementation outcome is neither success nor blocked capacity');
          if (!Array.isArray(r.changed_files) || r.changed_files.length === 0) throw new Error('Implementation reported no changed files');
          console.log('Runtime result reports changed files: ' + r.changed_files.join(', '));
          NODE
          OUTCOME="$(node -e "const r=require('./.agent/runtime/runtime-result.json'); process.stdout.write(r.outcome)")"
          if [ "$OUTCOME" = "blocked" ]; then
            echo "Blocked capacity requires no repository delta; continuing to Result Gate."
            exit 0
          fi
          CODE_DELTA="$(git diff --name-only -- . ':(exclude).agent/runtime/**')"
          UNTRACKED_DELTA="$(git ls-files --others --exclude-standard | grep -v '^.agent/runtime/' || true)"
          if [ -z "$CODE_DELTA$UNTRACKED_DELTA" ]; then
            echo "OpenHands exited successfully but produced no repository code delta."
            exit 1
          fi
          echo "Verified implementation repository delta and exact runtime report consistency."

      - name: Diff Gate
        if: env.AGENT_RUNTIME_MODE == 'openhands' && hashFiles('.agent/runtime/runtime-result.json') != ''
        run: |
          OUTCOME="$(node -e "const r=require('./.agent/runtime/runtime-result.json'); process.stdout.write(r.outcome)")"
          if [ "$OUTCOME" = "blocked" ]; then echo "Blocked capacity has no diff to validate; skipping Diff Gate."; exit 0; fi
          node scripts/agent-gatekeeper.js diff .agent/runtime/current-decision.json

      - name: Independent Validation
        if: env.AGENT_RUNTIME_MODE == 'openhands' && hashFiles('.agent/runtime/runtime-result.json') != ''
        run: |
          OUTCOME="$(node -e "const r=require('./.agent/runtime/runtime-result.json'); process.stdout.write(r.outcome)")"
          if [ "$OUTCOME" = "blocked" ]; then
            echo '[]' > .agent/runtime/validation-results.json
            echo "Blocked capacity has no implementation delta to validate."
            exit 0
          fi
          node - <<'NODE'
          const fs = require('fs');
          const d = JSON.parse(fs.readFileSync('.agent/runtime/current-decision.json', 'utf8'));
          const planned = (d.planned_validation || []).map(v => typeof v === 'string' ? v : v.command);
          const normalized = planned.map(command => {
            const match = command.match(/^npm --prefix (frontend|backend) run (build|test|lint)$/);
            if (!match) return { command };
            const [, workspace, script] = match;
            const pkg = JSON.parse(fs.readFileSync(`${workspace}/package.json`, 'utf8'));
            if (!pkg.scripts || typeof pkg.scripts[script] !== 'string' || !pkg.scripts[script].trim()) {
              return { command, skip: true, skip_reason: `${workspace}/package.json does not configure npm script '${script}'` };
            }
            return { command };
          });
          fs.writeFileSync('.agent/runtime/planned-validation.json', JSON.stringify(normalized, null, 2));
          for (const item of normalized) {
            if (item.skip) console.log(`Repository-aware validation: ${item.command} is not configured; recording not_configured.`);
          }
          NODE
          node scripts/agent-gatekeeper.js run-validation .agent/runtime/planned-validation.json

      - name: Result Gate
        if: env.AGENT_RUNTIME_MODE == 'openhands' && hashFiles('.agent/runtime/runtime-result.json') != ''
        run: |
          OUTCOME="$(node -e "const r=require('./.agent/runtime/runtime-result.json'); process.stdout.write(r.outcome)")"
          if [ "$OUTCOME" = "blocked" ]; then
            node -e "const fs=require('fs'); const r=require('./.agent/runtime/runtime-result.json'); const evidence=(r.implementation_summary+' '+r.known_limitations+' '+r.recommended_next_direction); if (!/capacity|provider|rate.?limit|exhaust/i.test(evidence)) throw new Error('Blocked result lacks provider-capacity evidence'); if ((r.changed_files||[]).length) throw new Error('Blocked result claims changed files'); console.log('Blocked capacity result accepted without implementation validation.');"
          else
            node scripts/agent-gatekeeper.js result .agent/runtime/runtime-result.json
          fi

      - name: Branch Commit
        if: env.AGENT_RUNTIME_MODE == 'openhands'
        run: |
          node -e "const r=require('./.agent/runtime/runtime-result.json'); if (r.outcome !== 'success') process.exit(1)" || { echo "Result was not success; skipping branch commit."; exit 0; }
          CYCLE_ID="$(node -e "const r=require('./.agent/runtime/runtime-result.json'); process.stdout.write(r.cycle_id)")"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          PENDING_TREE="$(git write-tree)"
          DECISION="$(node scripts/agent-branch-publish.js "$CYCLE_ID" "$PENDING_TREE")"
          ACTION="$(echo "$DECISION" | cut -d' ' -f1)"
          BRANCH="$(echo "$DECISION" | cut -d' ' -f2)"
          echo "Branch publication decision: action=$ACTION branch=$BRANCH"
          if [ "$ACTION" = "reuse_existing" ]; then
            echo "origin/$BRANCH already represents this exact result; skipping duplicate commit/push."
          else
            git switch -c "$BRANCH"
            git commit -m "Autonomous evolution $CYCLE_ID"
            git push origin "$BRANCH"
          fi
          echo "AGENT_BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: PR Creation
        if: env.AGENT_RUNTIME_MODE == 'openhands'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node - <<'NODE' > .agent/runtime/pr-body.md
          const fs = require('fs');
          const r = JSON.parse(fs.readFileSync('.agent/runtime/runtime-result.json','utf8'));
          const d = JSON.parse(fs.readFileSync('.agent/runtime/current-decision.json','utf8'));
          console.log(`Cycle ID: ${r.cycle_id}\n\nSelected backlog ID or repository-observed improvement: ${d.selected_backlog_id || d.repository_observed_improvement}\n\nSelected improvement: ${d.selected_improvement}\n\nSelection reason: ${d.selection_reason}\n\nDeclared scope: ${d.declared_scope}\n\nChanged files:\n${(r.changed_files || []).map(f => '- ' + f).join('\n')}\n\nActual validation commands and exit results:\n${(r.validation || []).map(v => `- ${v.command}: ${v.exit_code} (${v.outcome})`).join('\n')}\n\nKnown limitations: ${r.known_limitations}\n\nRecommended next direction: ${r.recommended_next_direction}\n\nRuntime name: ${r.runtime}\n\nRuntime pinned version: ${r.runtime_version || '1.16.0'}\n\nProvider: ${r.model_provider || 'gemini'}\n\nConfigured model identifier: ${r.model || process.env.AGENT_LLM_MODEL}`);
          NODE
          if [ -z "$AGENT_BRANCH" ]; then echo "No autonomous branch was created; skipping PR."; exit 0; fi
          EXISTING_PR="$(gh pr list --head "$AGENT_BRANCH" --state all --json number --jq '.[0].number' || true)"
          if [ -n "$EXISTING_PR" ]; then
            echo "A pull request already exists for $AGENT_BRANCH (#$EXISTING_PR); skipping duplicate PR creation."
            exit 0
          fi
          gh pr create --base main --head "$AGENT_BRANCH" --title "Autonomous evolution $(node -e "const r=require('./.agent/runtime/runtime-result.json'); process.stdout.write(r.cycle_id)")" --body-file .agent/runtime/pr-body.md

      - name: Report runtime status
        if: always()
        run: |
          if test -f .agent/runtime/runtime-result.json; then
            node -e "const r = JSON.parse(require('fs').readFileSync('.agent/runtime/runtime-result.json','utf8')); console.log('runtime=' + r.runtime); console.log('outcome=' + r.outcome); console.log(r.implementation_summary);"
          else
            echo "No runtime result was produced."
          fi
